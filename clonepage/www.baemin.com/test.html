<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배달의민족 - 배달팁 무료 배민클럽</title>

  <link rel="preload" href="./fonts/BAEMINWORK.otf" as="font" type="font/otf" crossorigin />
  <link rel="apple-touch-icon" href="https://www.baemin.com/_next/static/media/favicon-180x180.7697ba01.png" />
  <link rel="icon" href="https://www.baemin.com/_next/static/media/favicon.41582b85.ico" />
  <link rel="shortcut icon" href="https://www.baemin.com/_next/static/media/favicon.41582b85.ico" />
  <link rel="preload" href="./fonts/BAEMINWORK.otf" as="font" type="font/otf" crossorigin="">
  <style>
    /* =========================
      0) Base Reset
    ========================= */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell,
        "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      color: #111;
      background: #fff;
    }

    @font-face {
      font-family: "BAEMINWORK";
      src: url("./fonts/BAEMINWORK.otf") format("opentype");
      font-display: swap;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* 접근성: 화면에서 숨기되 읽히게 */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* =========================
      1) Variables
      - 배민: 헤더 height는 브레이크포인트로 변경
    ========================= */
    :root {
      --header-h: 96px;
      /* >=1024 */
    }

    /* =========================
      2) Fixed Header (배민 수치 기반)
    ========================= */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: transparent;
    }

    .site-header__inner {
      width: 100%;
      margin: 0 auto;
      height: var(--header-h);

      display: flex;
      align-items: center;
      justify-content: space-between;

      /* 기본(>=1024) */
      max-width: 1240px;
      padding: 0 55px;
      gap: 24px;
    }

    .site-header__inner a {
      font-size: 16px;
      font-weight: 700;
      line-height: 140%;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      color: #fff;
    }

    .site-header__logo img {
      width: auto;
      height: 32px;
    }

    /* 배민: <=599 */
    @media (max-width: 599px) {
      :root {
        --header-h: 80px;
      }

      .site-header__inner {
        height: var(--header-h);
        max-width: 100%;
        padding: 0 20px;
      }

      .site-header__logo img {
        height: 24px;
      }
    }

    /* 배민: 600~1023 */
    @media (min-width: 600px) and (max-width: 1023px) {
      :root {
        --header-h: 88px;
      }

      .site-header__inner {
        height: var(--header-h);
        max-width: 1240px;
        padding: 0 32px;
      }
    }

    /* =========================
      3) Snap Scroll Container
      - 스크롤은 .snap에서만
    ========================= */
    .page {
      height: 100vh;
      padding-top: 0;
    }

    .snap {
      height: 100vh;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    .snap__section {
      min-height: 100vh;
      scroll-snap-align: start;
      position: relative;
    }

    /* 모바일에서는 스냅 해제(배민 앱 느낌) */
    @media (max-width: 599px) {
      .snap {
        scroll-snap-type: none;
      }

      .snap__section {
        min-height: auto;
      }
    }

    /* =========================
      4) Intro (배민 구조로 정렬)
      - 부모(intro)가 align-items:center로 무대 역할
      - content(intro__content)는 width:100% + (1024+) max-width/margin-auto
    ========================= */
    .intro {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;

      display: flex;
      flex-direction: column;
      align-items: center;
      /* ✅ '무대' 중앙 정렬 */
      justify-content: center;
    }

    @media (max-width: 599px) {
      .intro {
        justify-content: flex-start;
        /* 배민 모바일 느낌 */
      }
    }

    .intro__bg {
      position: absolute;
      inset: 0;
      background: url("./img/main_05.63b54d5c.jpeg") center/cover no-repeat;
      z-index: 0;
    }

    /* (선택) 배민처럼 그라데이션 오버레이 */
    .intro__bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, .50) 2.52%, rgba(0, 0, 0, 0) 100%);
    }

    @media (min-width: 1024px) {
      .intro__bg::after {
        background: linear-gradient(90deg, rgba(0, 0, 0, .50) 2.52%, rgba(0, 0, 0, 0) 100%);
      }
    }

    /* ✅ 배민 ContentContainer 매핑 */
    .intro__content {
      width: 100%;
      position: relative;
      z-index: 1;

      display: flex;
      flex-direction: column;

      /* 배민은 gap이 브레이크포인트로 변함 */
      gap: 32px;
    }

    /* 모바일(≤599): padding + margin-top */
    @media (max-width: 599px) {
      .intro__content {
        padding: 48px 20px;
        gap: 16px;
        margin-top: 96px;
        /* 배민처럼 내려줌 */
      }
    }

    /* 600+ : padding만 */
    @media (min-width: 600px) {
      .intro__content {
        padding: 0 32px;
        margin-top: 0;
        gap: 32px;
      }
    }

    /* 1024+ : max-width + margin auto + padding + gap */
    @media (min-width: 1024px) {
      .intro__content {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 56px;
        gap: 40px;
      }
    }

    .intro__title {
      margin: 0;
    }

    /* ✅ 배민: 이미지 크기는 width가 아니라 height 기준 */
    .intro__title img {
      width: auto;
      height: 192px;
      /* 600+ 기본값 */
      max-width: 100%;
    }

    @media (min-width: 1024px) {
      .intro__title img {
        height: 240px;
        /* 배민: 1024+ */
      }
    }

    @media (max-width: 599px) {
      .intro__title img {
        height: 160px;
        /* 모바일은 보통 더 작게(원하는 값으로 조절) */
      }
    }

    .intro p {
      margin: 0;
    }

    .intro__subtitle {
      margin: 0;
      color: #0CEFD3;
      font-style: normal;
      font-weight: 800;
      line-height: 140%;
      text-align: left;
      font-size: 60px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    }

    @media (max-width: 599px) {
      .intro__subtitle {
        font-size: 32px;
      }
    }

    .intro__cta {
      display: flex;
      gap: 12px;
    }

    @media (max-width: 599px) {
      .intro__cta {
        flex-direction: column;
        align-items: stretch;
      }
    }

    /* 버튼 공통 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      background: #111;
    }

    .btn--ghost {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    /* =========================
      5) 일반 섹션 템플릿(2열)
    ========================= */
    .section__inner {
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 120px;

      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 48px;
    }

    @media (max-width: 599px) {
      .section__inner {
        min-height: auto;
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 48px 20px;
      }
    }

    /* =========================
      6) Footer
    ========================= */
    .footer__inner {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__logo" href="/" aria-label="배달의민족 홈">
        <img src="./img/logo@2x.50e61b82.png" alt="배달의민족" />
      </a>

      <a class="site-header__link" href="https://example.com" target="_blank" rel="noopener noreferrer">
        라이더 모집
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M3.92741 2.79468H6.92741C7.2956 2.79468 7.59408 3.09315 7.59408 3.46134C7.59408 3.82953 7.2956 4.12801 6.92741 4.12801H4.59408V12.128H12.5941V9.79468C12.5941 9.42649 12.8926 9.12801 13.2607 9.12801C13.6289 9.12801 13.9274 9.42649 13.9274 9.79468V12.7947C13.9274 13.1629 13.6289 13.4613 13.2607 13.4613H3.92741C3.55922 13.4613 3.26074 13.1629 3.26074 12.7947V3.46134C3.26074 3.09315 3.55922 2.79468 3.92741 2.79468Z"
            fill="currentColor"></path>
          <path
            d="M9.92739 2.79468H13.2607C13.6289 2.79468 13.9274 3.09315 13.9274 3.46134V6.79468C13.9274 7.16287 13.6289 7.46134 13.2607 7.46134C12.8925 7.46134 12.5941 7.16287 12.5941 6.79468V5.03735L9.73216 7.89925C9.47181 8.1596 9.0497 8.1596 8.78935 7.89925C8.529 7.6389 8.529 7.21679 8.78935 6.95644L11.6178 4.12801H9.92739C9.5592 4.12801 9.26072 3.82953 9.26072 3.46134C9.26072 3.09315 9.5592 2.79468 9.92739 2.79468Z"
            fill="currentColor"></path>
        </svg>
      </a>
    </div>
  </header>

  <div class="page">
    <main class="snap">
      <section id="s1" class="snap__section intro" aria-label="인트로">
        <div class="intro__bg" aria-hidden="true"></div>

        <div class="intro__content">
          <h1 class="intro__title">
            <picture>
              <source srcset="./img/main_text_05@3x.ef8973cd.png" media="(max-width: 599px)" />
              <img src="./img/main_text_05@3x.ef8973cd.png" alt="배달의민족" />
            </picture>
          </h1>

          <div class="intro__subtitle">
            <p>샐러드,</p>
            <p>지금 배민됩니다</p>
          </div>

          <div class="intro__cta">
            <a class="btn" href="#">앱 다운로드</a>
            <a class="btn btn--ghost" href="#">자세히 보기</a>
          </div>
        </div>
      </section>

      <section id="s2" class="snap__section section section--2" aria-label="섹션 2">
        <div class="section__inner">
          <h2>Section 2</h2>
        </div>
      </section>

      <section id="s3" class="snap__section section section--3" aria-label="섹션 3">
        <div class="section__inner">
          <h2>Section 3</h2>
        </div>
      </section>

      <section id="s4" class="snap__section section section--4" aria-label="섹션 4">
        <div class="section__inner">
          <h2>Section 4</h2>
        </div>
      </section>

      <section id="s5" class="snap__section section section--5" aria-label="섹션 5">
        <div class="section__inner">
          <h2>Section 5</h2>
        </div>
      </section>

      <section id="s6" class="snap__section section section--6" aria-label="섹션 6">
        <div class="section__inner">
          <h2>Section 6</h2>
        </div>
      </section>

      <section id="s7" class="snap__section section section--7" aria-label="섹션 7">
        <div class="section__inner">
          <h2>Section 7</h2>
        </div>
      </section>

      <section id="s8" class="snap__section section section--8" aria-label="섹션 8">
        <div class="section__inner">
          <h2>Section 8</h2>
        </div>
      </section>

      <section id="s9" class="snap__section section section--9" aria-label="섹션 9">
        <div class="section__inner">
          <h2>Section 9</h2>
        </div>
      </section>

      <section id="s10" class="snap__section footer" aria-label="푸터">
        <footer class="footer__inner">
          <h2 class="sr-only">Footer</h2>
          <p>© Woowa Brothers</p>
        </footer>
      </section>
    </main>
  </div>
</body>

</html>
